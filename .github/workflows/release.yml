name: Release MLX Air

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Validate and build darwin-arm64 archive
    runs-on: macos-15
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out source tag
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.21"

      - name: Validate release version
        id: version
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$REF_TYPE" == "tag" ]]; then
            version="$(python3 scripts/release_tool.py version --repo-root . --tag "$REF_NAME")"
          else
            version="$(python3 scripts/release_tool.py version --repo-root .)"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Verify Apple Silicon runner
        run: |
          test "$(uname -s)" = "Darwin"
          test "$(uname -m)" = "arm64"

      - name: Run Rust checks
        run: |
          cargo fmt --check
          cargo clippy --workspace --all-targets --all-features -- -D warnings
          cargo test --workspace --all-features

      - name: Run Python checks
        working-directory: python
        run: |
          uv sync
          uv run ruff format --check . ../scripts/release_tool.py
          uv run ruff check . ../scripts/release_tool.py
          uv run pytest

      - name: Stage and archive distribution
        run: scripts/package-mlx-air.sh --output-dir release --version "$VERSION"

      - name: Run installed doctor outside source checkout
        env:
          UV_CACHE_DIR: ${{ runner.temp }}/uv-cache
        run: |
          mkdir -p "$RUNNER_TEMP/archive" "$RUNNER_TEMP/outside" "$RUNNER_TEMP/home"
          tar -xzf "release/mlx-air-$VERSION-darwin-arm64.tar.gz" -C "$RUNNER_TEMP/archive"
          export MLX_AIR_CLI="$RUNNER_TEMP/archive/mlx-air-$VERSION/bin/mlx-air"
          export MLX_AIR_TEST_HOME="$RUNNER_TEMP/home"
          export MLX_AIR_TEST_CWD="$RUNNER_TEMP/outside"
          python3 - <<'PY'
          import os
          import subprocess

          environment = os.environ.copy()
          environment["HOME"] = environment["MLX_AIR_TEST_HOME"]
          subprocess.run(
              [environment["MLX_AIR_CLI"], "doctor"],
              cwd=environment["MLX_AIR_TEST_CWD"],
              env=environment,
              check=True,
              timeout=1800,
          )
          PY

      - name: Upload validated release outputs
        uses: actions/upload-artifact@v7
        with:
          name: mlx-air-${{ steps.version.outputs.version }}-darwin-arm64
          path: release/*
          if-no-files-found: error
          retention-days: 14

  attest:
    name: Attest release provenance
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download validated release outputs
        uses: actions/download-artifact@v7
        with:
          name: mlx-air-${{ needs.build.outputs.version }}-darwin-arm64
          path: release

      - name: Generate build provenance
        uses: actions/attest@v4
        with:
          subject-path: release/mlx-air-${{ needs.build.outputs.version }}-darwin-arm64.tar.gz

  publish:
    name: Publish immutable GitHub Release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs:
      - build
      - attest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download attested release outputs
        uses: actions/download-artifact@v7
        with:
          name: mlx-air-${{ needs.build.outputs.version }}-darwin-arm64
          path: release

      - name: Verify checksum
        working-directory: release
        run: sha256sum --check "mlx-air-${{ needs.build.outputs.version }}-darwin-arm64.tar.gz.sha256"

      - name: Reject an existing release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "error: release already exists for $TAG; publish a new patch version" >&2
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          gh release create "$TAG" \
            "release/mlx-air-$VERSION-darwin-arm64.tar.gz" \
            "release/mlx-air-$VERSION-darwin-arm64.tar.gz.sha256" \
            --verify-tag \
            --generate-notes \
            --title "MLX Air $VERSION"

  update-homebrew:
    name: Open Homebrew formula update
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs:
      - build
      - publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source tooling
        uses: actions/checkout@v6
        with:
          path: source
          persist-credentials: false

      - name: Check out Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: huydt84/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Download published release outputs
        uses: actions/download-artifact@v7
        with:
          name: mlx-air-${{ needs.build.outputs.version }}-darwin-arm64
          path: release

      - name: Update only Formula/mlx-air.rb
        env:
          VERSION: ${{ needs.build.outputs.version }}
          TAG: ${{ github.ref_name }}
        run: |
          sha256="$(awk '{print $1}' "release/mlx-air-$VERSION-darwin-arm64.tar.gz.sha256")"
          url="https://github.com/${{ github.repository }}/releases/download/$TAG/mlx-air-$VERSION-darwin-arm64.tar.gz"
          python3 source/scripts/release_tool.py formula \
            --tap-root tap \
            --version "$VERSION" \
            --url "$url" \
            --sha256 "$sha256"
          test "$(git -C tap diff --name-only)" = "Formula/mlx-air.rb"

      - name: Create formula pull request
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          branch="mlx-air-$VERSION-${{ github.run_id }}"
          default_branch="$(gh repo view huydt84/homebrew-tap --json defaultBranchRef --jq .defaultBranchRef.name)"
          git -C tap config user.name "github-actions[bot]"
          git -C tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C tap switch -c "$branch"
          git -C tap add Formula/mlx-air.rb
          git -C tap diff --cached --check
          git -C tap commit -m "mlx-air $VERSION"
          git -C tap push --set-upstream origin "$branch"
          pr_url="$(gh pr create \
            --repo huydt84/homebrew-tap \
            --base "$default_branch" \
            --head "$branch" \
            --title "mlx-air $VERSION" \
            --body "Update mlx-air to the immutable v$VERSION release asset and checksum.")"
          gh pr merge "$pr_url" --repo huydt84/homebrew-tap --auto --squash
