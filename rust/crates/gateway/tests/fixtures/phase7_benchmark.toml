schema_version = 1

[execution]
server_modes = ["self-launched", "external"]
load_modes = ["sequential", "burst", "closed-loop"]
metric_directions = ["lower", "higher"]
metric_units = ["ms", "tokens/s"]

[sampling]
seed = 7
temperature = 0.0
top_p = 1.0
request_timeout_seconds = 30
readiness_timeout_seconds = 30

[calibration]
maximum_coefficient_of_variation_percent = 5.0

[prompt_bank.measured_short]
kind = "short"
material = "measured"
count = 8
target_tokens = 16

[prompt_bank.warmup_short]
kind = "short"
material = "warmup"
count = 2
target_tokens = 16

[cache_states.cold]
mode = "cold"
unit = "tokens"
value = 0

[warmup_groups.short]
prompt_group = "warmup_short"
concurrency = 1
output_tokens = 4

[models.primary]
checkpoint = "mlx-community/Qwen3-4B-Instruct-2507-4bit"
tokenizer = "mlx-community/Qwen3-4B-Instruct-2507-4bit"
revision = "resolve-at-run"

[runtime_configurations.serial]
backend = "v1"
environment = { MLX_RUNTIME_CONTINUOUS_BATCHING = "0" }

[workloads.sequential_stream]
prompt_group = "measured_short"
output_tokens = 4
streaming = true
load_mode = "sequential"
concurrency = 1
cache_state = "cold"
primary_metric = "ttft"
metric_direction = "lower"
metric_unit = "ms"
secondary_metrics = ["end_to_end_latency", "tpot", "aggregate_output_tokens_per_second"]
runtime_configurations = ["serial"]
trials = 1
requests_per_trial = 2

[workloads.burst_nonstream]
prompt_group = "measured_short"
output_tokens = 4
streaming = false
load_mode = "burst"
concurrency = 3
cache_state = "cold"
primary_metric = "end_to_end_latency"
metric_direction = "lower"
metric_unit = "ms"
secondary_metrics = ["aggregate_output_tokens_per_second"]
runtime_configurations = ["serial"]
trials = 1
requests_per_trial = 3

[workloads.closed_stream]
prompt_group = "measured_short"
output_tokens = 4
streaming = true
load_mode = "closed-loop"
concurrency = 2
cache_state = "cold"
primary_metric = "aggregate_output_tokens_per_second"
metric_direction = "higher"
metric_unit = "tokens/s"
secondary_metrics = ["ttft", "end_to_end_latency", "tpot"]
runtime_configurations = ["serial"]
trials = 1
requests_per_trial = 6

[focuses.all]
models = ["primary"]
workloads = ["sequential_stream", "burst_nonstream", "closed_stream"]

[configuration_orders.primary]
model = "primary"
runtime_configurations = ["serial"]

[tail_sets.none]
workloads = []

[diagnostics.smoke]
models = ["primary"]
workloads = ["sequential_stream"]
profilers = ["pipeline"]

[suites.smoke]
models = ["primary"]
workloads = ["sequential_stream", "burst_nonstream", "closed_stream"]
runtime_configurations = ["serial"]
warmup_groups = ["short"]
configuration_orders = ["primary"]
focuses = ["all"]
focus_required = false
trials = 1
max_model_starts = 1
tail_set = "none"
representative_diagnostic_families = ["smoke"]
diagnostic_families = ["smoke"]
coverage = [
  { model = "primary", workloads = ["sequential_stream", "burst_nonstream", "closed_stream"] },
]
