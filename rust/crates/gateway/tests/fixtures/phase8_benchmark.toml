schema_version = 1

[execution]
server_modes = ["self-launched", "external"]
load_modes = ["sequential", "burst", "closed-loop"]
metric_directions = ["lower", "higher"]
metric_units = ["ms", "tokens/s"]

[sampling]
seed = 8
temperature = 0.0
top_p = 1.0
request_timeout_seconds = 30
readiness_timeout_seconds = 30

[calibration]
maximum_coefficient_of_variation_percent = 5.0

[prompt_bank.cold]
kind = "short"
material = "measured"
count = 2
target_tokens = 16

[prompt_bank.shared]
kind = "shared-prefix"
material = "measured"
count = 2
target_tokens = 16
prefix_groups = 1
suffixes_per_group = 2

[prompt_bank.pressure]
kind = "cache-pressure"
material = "measured"
count = 2
target_tokens = 16

[prompt_bank.warmup]
kind = "short"
material = "warmup"
count = 1
target_tokens = 16

[cache_states.cold]
mode = "cold"
unit = "tokens"
value = 0

[cache_states.warm]
mode = "warm-prefix"
unit = "tokens"
value = 8

[cache_states.pressure]
mode = "cache-pressure"
unit = "percent"
value = 125

[warmup_groups.compile]
prompt_group = "warmup"
concurrency = 1
output_tokens = 1

[models.primary]
checkpoint = "mlx-community/Qwen3-4B-Instruct-2507-4bit"
tokenizer = "mlx-community/Qwen3-4B-Instruct-2507-4bit"
revision = "resolve-at-run"

[runtime_configurations.serial]
backend = "v1"
environment = { MLX_RUNTIME_CONTINUOUS_BATCHING = "0" }

[runtime_configurations.overlap]
backend = "v1"
environment = { MLX_RUNTIME_CONTINUOUS_BATCHING = "1" }

[workloads.cold]
prompt_group = "cold"
output_tokens = 2
streaming = false
load_mode = "sequential"
concurrency = 1
cache_state = "cold"
primary_metric = "end_to_end_latency"
metric_direction = "lower"
metric_unit = "ms"
secondary_metrics = ["aggregate_output_tokens_per_second"]
runtime_configurations = ["serial", "overlap"]
trials = 1
requests_per_trial = 2

[workloads.shared]
prompt_group = "shared"
output_tokens = 2
streaming = false
load_mode = "burst"
concurrency = 2
cache_state = "warm"
primary_metric = "ttft"
metric_direction = "lower"
metric_unit = "ms"
secondary_metrics = ["end_to_end_latency", "aggregate_output_tokens_per_second"]
runtime_configurations = ["serial", "overlap"]
trials = 1
requests_per_trial = 2

[workloads.pressure]
prompt_group = "pressure"
output_tokens = 2
streaming = false
load_mode = "burst"
concurrency = 2
cache_state = "pressure"
primary_metric = "end_to_end_latency"
metric_direction = "lower"
metric_unit = "ms"
secondary_metrics = ["aggregate_output_tokens_per_second"]
runtime_configurations = ["serial", "overlap"]
trials = 1
requests_per_trial = 2

[focuses.all]
models = ["primary"]
workloads = ["cold", "shared", "pressure"]

[configuration_orders.round]
model = "primary"
runtime_configurations = ["serial", "overlap"]

[tail_sets.none]
workloads = []

[diagnostics.cache]
models = ["primary"]
workloads = ["shared", "pressure"]

[suites.phase8]
models = ["primary"]
workloads = ["cold", "shared", "pressure"]
runtime_configurations = ["serial", "overlap"]
warmup_groups = ["compile"]
configuration_orders = ["round"]
focuses = ["all"]
focus_required = false
trials = 1
max_model_starts = 2
tail_set = "none"
diagnostic_families = ["cache"]
coverage = [
  { model = "primary", workloads = ["cold", "shared", "pressure"] },
]
