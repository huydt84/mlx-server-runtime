[workloads.shared_prefix_warm_c4]
prompt_group = "shared_prefix"
output_tokens = 32
streaming = true
load_mode = "burst"
concurrency = 16
cache_state = "warm_prefix"
primary_metric = "ttft"
metric_direction = "lower"
metric_unit = "ms"
secondary_metrics = ["end_to_end_latency", "tpot", "aggregate_output_tokens_per_second"]
runtime_configurations = ["serial", "overlap"]
trials = 1
requests_per_trial = 16

[workloads.cache_pressure]
prompt_group = "cache_pressure"
output_tokens = 16
streaming = false
load_mode = "burst"
concurrency = 16
cache_state = "cache_pressure"
primary_metric = "end_to_end_latency"
metric_direction = "lower"
metric_unit = "ms"
secondary_metrics = ["aggregate_output_tokens_per_second"]
runtime_configurations = ["serial", "overlap"]
trials = 1
requests_per_trial = 16

[focuses.gateway]
models = ["runtime_control", "primary"]
workloads = ["interactive_stream_c1", "short_nonstream_c1"]

[focuses.prefill]
models = ["primary", "dense"]
workloads = ["cold_prefill_2k_c1", "mixed_c8"]

[focuses.decode]
models = ["primary", "moe"]
workloads = ["decode_128_c1", "mixed_c8"]

[focuses.scheduler]
models = ["primary", "moe"]
workloads = ["steady_short_c4", "steady_short_c8", "mixed_c8"]

[focuses.cache]
models = ["primary", "dense"]
workloads = ["cold_prefill_2k_c1", "shared_prefix_warm_c4", "cache_pressure"]

[focuses.all]
models = ["primary", "dense", "moe", "runtime_control"]
workloads = ["interactive_stream_c1", "short_nonstream_c1", "cold_prefill_2k_c1", "decode_128_c1", "steady_short_c4", "steady_short_c8", "mixed_c8", "shared_prefix_warm_c4", "cache_pressure"]

[suites.smoke]
models = ["primary"]
workloads = ["interactive_stream_c1", "short_nonstream_c1", "steady_short_c4", "shared_prefix_warm_c4"]
runtime_configurations = ["serial", "overlap"]
warmup_groups = ["short_single", "batch4"]
configuration_orders = ["primary_round_1", "primary_round_2"]
focuses = []
focus_required = false
trials = 1
max_model_starts = 4
tail_set = "none"
representative_diagnostic_families = []
diagnostic_families = []
coverage = [
  { model = "primary", workloads = ["interactive_stream_c1", "short_nonstream_c1", "steady_short_c4", "shared_prefix_warm_c4"] },
]

