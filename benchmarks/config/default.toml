schema_version = 1

[execution]
server_modes = ["self-launched", "external"]
load_modes = ["sequential", "burst", "closed-loop"]
metric_directions = ["lower", "higher"]
metric_units = ["ms", "tokens/s"]

[sampling]
seed = 20260715
temperature = 0.0
top_p = 1.0
request_timeout_seconds = 300
readiness_timeout_seconds = 1800

[calibration]
maximum_coefficient_of_variation_percent = 5.0

[prompt_bank.short]
kind = "short"
material = "measured"
count = 48
target_tokens = 32

[prompt_bank.medium]
kind = "medium"
material = "measured"
count = 24
target_tokens = 512

[prompt_bank.long]
kind = "long"
material = "measured"
count = 24
target_tokens = 2048

[prompt_bank.decode_promoting]
kind = "decode-promoting"
material = "measured"
count = 24
target_tokens = 32

[prompt_bank.shared_prefix]
kind = "shared-prefix"
material = "measured"
count = 64
target_tokens = 512
prefix_groups = 8
suffixes_per_group = 8

[prompt_bank.cache_pressure]
kind = "cache-pressure"
material = "measured"
count = 16
target_tokens = 2048

[prompt_bank.warmup_short]
kind = "short"
material = "warmup"
count = 8
target_tokens = 32

[prompt_bank.warmup_long]
kind = "long"
material = "warmup"
count = 4
target_tokens = 2048

[prompt_bank.warmup_decode]
kind = "decode-promoting"
material = "warmup"
count = 4
target_tokens = 32

[prompt_bank.warmup_batch4]
kind = "short"
material = "warmup"
count = 4
target_tokens = 32

[prompt_bank.warmup_mixed8]
kind = "medium"
material = "warmup"
count = 8
target_tokens = 512

[cache_states.cold]
mode = "cold"
unit = "tokens"
value = 0

[cache_states.warm_prefix]
mode = "warm-prefix"
unit = "tokens"
value = 512

[cache_states.cache_pressure]
mode = "cache-pressure"
unit = "percent"
value = 125

[warmup_groups.short_single]
prompt_group = "warmup_short"
concurrency = 1
output_tokens = 32

[warmup_groups.long_prefill]
prompt_group = "warmup_long"
concurrency = 1
output_tokens = 16

[warmup_groups.long_decode]
prompt_group = "warmup_decode"
concurrency = 1
output_tokens = 128

[warmup_groups.batch4]
prompt_group = "warmup_batch4"
concurrency = 4
output_tokens = 32

[warmup_groups.mixed_batch8]
prompt_group = "warmup_mixed8"
concurrency = 8
output_tokens = 32

[models.primary]
checkpoint = "mlx-community/Qwen3-4B-Instruct-2507-4bit"
tokenizer = "mlx-community/Qwen3-4B-Instruct-2507-4bit"
revision = "resolve-at-run"

[models.dense]
checkpoint = "mlx-community/Qwen2.5-7B-Instruct-4bit"
tokenizer = "mlx-community/Qwen2.5-7B-Instruct-4bit"
revision = "resolve-at-run"

[models.moe]
checkpoint = "mlx-community/LFM2.5-8B-A1B-MLX-4bit"
tokenizer = "mlx-community/LFM2.5-8B-A1B-MLX-4bit"
revision = "resolve-at-run"

[models.runtime_control]
checkpoint = "mlx-community/gemma-3-270m-it-qat-8bit"
tokenizer = "mlx-community/gemma-3-270m-it-qat-8bit"
revision = "resolve-at-run"

[runtime_configurations.serial]
backend = "native-mlx"
environment = { MLX_RUNTIME_CONTINUOUS_BATCHING = "1", MLX_RUNTIME_NATIVE_EXECUTION_MODE = "serial", MLX_RUNTIME_TEXT_CACHE_BUDGET_BYTES = "268435456" }

[runtime_configurations.overlap]
backend = "native-mlx"
environment = { MLX_RUNTIME_CONTINUOUS_BATCHING = "1", MLX_RUNTIME_NATIVE_EXECUTION_MODE = "overlap", MLX_RUNTIME_TEXT_CACHE_BUDGET_BYTES = "268435456" }

[workloads.interactive_stream_c1]
prompt_group = "short"
output_tokens = 32
streaming = true
load_mode = "sequential"
concurrency = 1
cache_state = "cold"
primary_metric = "ttft"
metric_direction = "lower"
metric_unit = "ms"
secondary_metrics = ["end_to_end_latency", "tpot", "aggregate_output_tokens_per_second"]
runtime_configurations = ["serial", "overlap"]
trials = 1
requests_per_trial = 6

[workloads.short_nonstream_c1]
prompt_group = "short"
output_tokens = 32
streaming = false
load_mode = "sequential"
concurrency = 1
cache_state = "cold"
primary_metric = "end_to_end_latency"
metric_direction = "lower"
metric_unit = "ms"
secondary_metrics = ["aggregate_output_tokens_per_second"]
runtime_configurations = ["serial", "overlap"]
trials = 1
requests_per_trial = 6

[workloads.cold_prefill_2k_c1]
prompt_group = "long"
output_tokens = 16
streaming = true
load_mode = "sequential"
concurrency = 1
cache_state = "cold"
primary_metric = "ttft"
metric_direction = "lower"
metric_unit = "ms"
secondary_metrics = ["end_to_end_latency", "tpot", "aggregate_output_tokens_per_second"]
runtime_configurations = ["serial", "overlap"]
trials = 1
requests_per_trial = 4

[workloads.decode_128_c1]
prompt_group = "decode_promoting"
output_tokens = 128
streaming = true
load_mode = "sequential"
concurrency = 1
cache_state = "cold"
primary_metric = "tpot"
metric_direction = "lower"
metric_unit = "ms"
secondary_metrics = ["ttft", "end_to_end_latency", "aggregate_output_tokens_per_second"]
runtime_configurations = ["serial", "overlap"]
trials = 1
requests_per_trial = 4

[workloads.steady_short_c4]
prompt_group = "short"
output_tokens = 32
streaming = true
load_mode = "closed-loop"
concurrency = 4
cache_state = "cold"
primary_metric = "aggregate_output_tokens_per_second"
metric_direction = "higher"
metric_unit = "tokens/s"
secondary_metrics = ["ttft", "end_to_end_latency", "tpot"]
runtime_configurations = ["serial", "overlap"]
trials = 1
requests_per_trial = 16

[workloads.steady_short_c8]
prompt_group = "short"
output_tokens = 32
streaming = true
load_mode = "closed-loop"
concurrency = 8
cache_state = "cold"
primary_metric = "aggregate_output_tokens_per_second"
metric_direction = "higher"
metric_unit = "tokens/s"
secondary_metrics = ["ttft", "end_to_end_latency", "tpot"]
runtime_configurations = ["serial", "overlap"]
trials = 1
requests_per_trial = 32

[workloads.mixed_c8]
prompt_group = "medium"
output_tokens = 32
streaming = true
load_mode = "closed-loop"
concurrency = 8
cache_state = "cold"
primary_metric = "aggregate_output_tokens_per_second"
metric_direction = "higher"
metric_unit = "tokens/s"
secondary_metrics = ["ttft", "end_to_end_latency", "tpot"]
runtime_configurations = ["serial", "overlap"]
trials = 1
