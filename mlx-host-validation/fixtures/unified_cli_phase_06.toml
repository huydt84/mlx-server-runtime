schema_version = 1

[execution]
server_modes = ["self-launched", "external"]
load_modes = ["sequential", "burst", "closed-loop"]
metric_directions = ["lower", "higher"]
metric_units = ["ms", "tokens/s"]

[sampling]
seed = 6006
temperature = 0.0
top_p = 1.0
request_timeout_seconds = 300
readiness_timeout_seconds = 1800

[calibration]
maximum_coefficient_of_variation_percent = 5.0

[prompt_bank.measured]
kind = "short"
material = "measured"
count = 4
target_tokens = 32

[prompt_bank.compile]
kind = "short"
material = "warmup"
count = 1
target_tokens = 32

[cache_states.cold]
mode = "cold"
unit = "tokens"
value = 0

[warmup_groups.compile]
prompt_group = "compile"
concurrency = 1
output_tokens = 4

[models.primary]
checkpoint = "mlx-community/Qwen3-4B-Instruct-2507-4bit"
tokenizer = "mlx-community/Qwen3-4B-Instruct-2507-4bit"
revision = "resolve-at-run"

[runtime_configurations.serial]
backend = "native-mlx"
environment = { MLX_RUNTIME_CONTINUOUS_BATCHING = "1", MLX_RUNTIME_NATIVE_EXECUTION_MODE = "serial", MLX_RUNTIME_TEXT_CACHE_BUDGET_BYTES = "268435456" }

[workloads.sequential]
prompt_group = "measured"
output_tokens = 4
streaming = false
load_mode = "sequential"
concurrency = 1
cache_state = "cold"
primary_metric = "end_to_end_latency"
metric_direction = "lower"
metric_unit = "ms"
secondary_metrics = ["aggregate_output_tokens_per_second"]
runtime_configurations = ["serial"]
trials = 1
requests_per_trial = 2

[workloads.closed_loop]
prompt_group = "measured"
output_tokens = 4
streaming = true
load_mode = "closed-loop"
concurrency = 2
cache_state = "cold"
primary_metric = "aggregate_output_tokens_per_second"
metric_direction = "higher"
metric_unit = "tokens/s"
secondary_metrics = ["ttft", "end_to_end_latency", "tpot"]
runtime_configurations = ["serial"]
trials = 1
requests_per_trial = 4

[focuses.all]
models = ["primary"]
workloads = ["sequential", "closed_loop"]

[configuration_orders.primary]
model = "primary"
runtime_configurations = ["serial"]

[tail_sets.none]
workloads = []

[diagnostics.smoke]
models = ["primary"]
workloads = ["sequential"]
profilers = ["pipeline"]

[suites.phase6]
models = ["primary"]
workloads = ["sequential", "closed_loop"]
runtime_configurations = ["serial"]
warmup_groups = ["compile"]
configuration_orders = ["primary"]
focuses = ["all"]
focus_required = false
trials = 1
max_model_starts = 1
tail_set = "none"
representative_diagnostic_families = ["smoke"]
diagnostic_families = ["smoke"]
coverage = [
  { model = "primary", workloads = ["sequential", "closed_loop"] },
]
