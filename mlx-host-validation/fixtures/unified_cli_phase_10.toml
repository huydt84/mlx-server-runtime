schema_version = 1

[execution]
server_modes = ["self-launched", "external"]
load_modes = ["sequential", "burst", "closed-loop"]
metric_directions = ["lower", "higher"]
metric_units = ["ms", "tokens/s"]

[sampling]
seed = 1010
temperature = 0.0
top_p = 1.0
request_timeout_seconds = 300
readiness_timeout_seconds = 1800

[calibration]
maximum_coefficient_of_variation_percent = 10.0

[prompt_bank.measured]
kind = "short"
material = "measured"
count = 2
target_tokens = 32

[prompt_bank.warmup]
kind = "short"
material = "warmup"
count = 1
target_tokens = 32

[cache_states.cold]
mode = "cold"
unit = "tokens"
value = 0

[warmup_groups.compile]
prompt_group = "warmup"
concurrency = 1
output_tokens = 2

[models.control]
checkpoint = "mlx-community/gemma-3-270m-it-qat-8bit"
tokenizer = "mlx-community/gemma-3-270m-it-qat-8bit"
revision = "resolve-at-run"

[runtime_configurations.serial]
backend = "native-mlx"
environment = { MLX_RUNTIME_CONTINUOUS_BATCHING = "1", MLX_RUNTIME_NATIVE_EXECUTION_MODE = "serial" }

[workloads.gateway_profile]
prompt_group = "measured"
output_tokens = 2
streaming = true
load_mode = "sequential"
concurrency = 1
cache_state = "cold"
primary_metric = "end_to_end_latency"
metric_direction = "lower"
metric_unit = "ms"
secondary_metrics = ["ttft", "tpot"]
runtime_configurations = ["serial"]
trials = 1
requests_per_trial = 1

[workloads.decode_profile]
prompt_group = "measured"
output_tokens = 4
streaming = true
load_mode = "sequential"
concurrency = 1
cache_state = "cold"
primary_metric = "tpot"
metric_direction = "lower"
metric_unit = "ms"
secondary_metrics = ["ttft", "end_to_end_latency"]
runtime_configurations = ["serial"]
trials = 1
requests_per_trial = 1

[focuses.all]
models = ["control"]
workloads = ["gateway_profile", "decode_profile"]

[configuration_orders.control]
model = "control"
runtime_configurations = ["serial"]

[tail_sets.none]
workloads = []

[diagnostics.gateway]
models = ["control"]
workloads = ["gateway_profile"]
profilers = ["pipeline"]

[diagnostics.decode]
models = ["control"]
workloads = ["decode_profile"]
profilers = ["graph"]

[suites.phase10]
models = ["control"]
workloads = ["gateway_profile", "decode_profile"]
runtime_configurations = ["serial"]
warmup_groups = ["compile"]
configuration_orders = ["control"]
focuses = []
focus_required = false
trials = 1
max_model_starts = 1
tail_set = "none"
representative_diagnostic_families = ["gateway"]
diagnostic_families = ["gateway", "decode"]
coverage = [
  { model = "control", workloads = ["gateway_profile", "decode_profile"] },
]
